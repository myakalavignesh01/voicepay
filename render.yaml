services:
  - type: web
    name: voicepay-api
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: voicepay-app
    env: node
    plan: free
    buildCommand: cd desktop && npm install && npm run build
    startCommand: cd desktop && npm install -g serve && serve -s build -l 3000
    envVars:
      - key: REACT_APP_API_URL
        value: https://voicepay-api.onrender.com
