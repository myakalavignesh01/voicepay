services:\n  - type: web\n    name: voicepay-backend\n    env: node\n    plan: free\n    buildCommand: cd backend && npm install\n    startCommand: cd backend && npm start\n    envVars:\n      - key: NODE_ENV\n        value: production\n      - key: PORT\n        value: 8000\n      - key: DATABASE_URL\n        sync: false\n      - key: JWT_SECRET\n        sync: false\n      - key: RAZORPAY_KEY_ID\n        sync: false\n      - key: RAZORPAY_KEY_SECRET\n        sync: false\n\n  - type: web\n    name: voicepay-frontend\n    env: node\n    plan: free\n    buildCommand: cd desktop && npm install && npm run build\n    startCommand: cd desktop && npm run build && serve -s build -l 3000\n    envVars:\n      - key: REACT_APP_API_URL\n        value: https://voicepay-backend.onrender.com\n"
